# =============================================================================
# bt2iap ALSA configuration
# -----------------------------------------------------------------------------
# Installed to /etc/asound.conf by scripts/bootstrap.sh (or manually copied).
#
# Audio topology:
#   [Phone] --A2DP BT--> [BlueALSA] --> [ALSA loopback (snd-aloop)]
#                                    --> [g_ipod_audio 'iPodUSB' card]
#                                    --> [USB-A to Outlander MMCS]
#
# BlueALSA exposes BT audio as a virtual ALSA PCM; bluealsa-aplay (scripts/
# audio-bridge.sh) reads from BlueALSA and writes to the default PCM defined
# here. The default PCM is wired to the *playback side* of snd-aloop
# (hw:Loopback,0,0). The *capture side* of the same loopback (hw:Loopback,1,0)
# is then copied to the iPodUSB card by a separate process — or, if the kernel
# build supports it, routed directly via a plug/asym chain as configured below.
#
# Kernel / package prerequisites:
#   - snd-aloop      (Raspberry Pi OS: sudo modprobe snd-aloop ; or
#                     /etc/modules-load.d/snd-aloop.conf -> "snd-aloop")
#   - bluealsa       (apt install bluealsa)
#   - g_ipod_audio   (built by oandrew/ipod-gadget, loaded via
#                     scripts/load-gadget.sh; exposes ALSA card "iPodUSB")
#
# References:
#   - snd-aloop:      Documentation/sound/cards/aloop.rst in Linux source
#   - ALSA config:    man 5 asound.conf ; https://alsa.opensrc.org/Asoundrc
#   - BlueALSA:       https://github.com/arkq/bluez-alsa
#   - ipod-gadget:    https://github.com/oandrew/ipod-gadget
# =============================================================================


# -----------------------------------------------------------------------------
# (1) Loopback playback side.
# -----------------------------------------------------------------------------
# snd-aloop creates a "Loopback" card with two devices (0 and 1) and two
# subdevices per device. Anything written to hw:Loopback,0,<N> appears as
# captured audio on hw:Loopback,1,<N>, and vice-versa. We use:
#
#     writer -> hw:Loopback,0,0    (playback end)
#     reader <- hw:Loopback,1,0    (capture end, read by audio-bridge consumer)
#
# NOTE: On Raspberry Pi OS, the Loopback card name is literally "Loopback"
# (seen in `aplay -l`). If the card index shifts, prefer the by-name form.
# -----------------------------------------------------------------------------

pcm.aloop_playback {
    type plug
    slave {
        pcm "hw:Loopback,0,0"
        # 44.1 kHz stereo S16_LE matches A2DP SBC/AAC decode output.
        # `plug` upstream handles format/rate conversion if a source disagrees.
        rate 44100
        format S16_LE
        channels 2
    }
    hint {
        show on
        description "bt2iap — loopback playback (BlueALSA writes here)"
    }
}


# -----------------------------------------------------------------------------
# (2) iPod USB gadget sink.
# -----------------------------------------------------------------------------
# g_ipod_audio.ko registers an ALSA card. In upstream oandrew/ipod-gadget the
# card identifier is "iPodUSB" (see gadget/audio.c / module param CARD=).
# If a future kernel module build renames the card, either:
#   (a) re-`insmod g_ipod_audio.ko CARD=iPodUSB` (re-pin the name), or
#   (b) edit the `pcm` line below to match the new name.
# Discover it live with: `aplay -l` (look for "card N: iPodUSB").
# -----------------------------------------------------------------------------

pcm.ipod_sink {
    type plug
    slave {
        pcm "hw:iPodUSB,0"
        # iPodUSB gadget presents a standard 44.1 kHz S16_LE stereo interface;
        # `plug` tolerates mismatches but we hint at the expected params.
        rate 44100
        format S16_LE
        channels 2
    }
    hint {
        show on
        description "bt2iap — iPodUSB gadget sink (USB -> Outlander MMCS)"
    }
}


# -----------------------------------------------------------------------------
# (3) Loopback capture -> iPodUSB (reader side).
# -----------------------------------------------------------------------------
# This defines the pcm that a bridge reader (e.g. `alsaloop` or a second
# bluealsa-aplay stage) would open on the *capture* end of the loopback to
# forward bytes into the iPodUSB card. Kept as a named PCM so diagnostic
# tools can target it directly without re-typing hw params.
# -----------------------------------------------------------------------------

pcm.aloop_capture {
    type plug
    slave {
        pcm "hw:Loopback,1,0"
        rate 44100
        format S16_LE
        channels 2
    }
    hint {
        show on
        description "bt2iap — loopback capture (forward to iPodUSB)"
    }
}


# -----------------------------------------------------------------------------
# (4) Convenience: a direct "phone straight to iPod" PCM.
# -----------------------------------------------------------------------------
# Some deployments skip the loopback and let BlueALSA write straight into
# iPodUSB. Keeping this defined helps with `aplay -D bt2iap_direct ...`
# verification runs in scripts/verify-audio.sh without editing this file.
# -----------------------------------------------------------------------------

pcm.bt2iap_direct {
    type plug
    slave.pcm "ipod_sink"
    hint {
        show on
        description "bt2iap — direct write to iPodUSB (bypass loopback)"
    }
}


# -----------------------------------------------------------------------------
# (5) System default PCM.
# -----------------------------------------------------------------------------
# Setting pcm.!default makes `aplay ...` (no -D), `bluealsa-aplay --pcm=default`,
# and most other ALSA clients write into the loopback playback side. The
# capture side of the same loopback is then consumed by a forwarding stage
# (e.g. `alsaloop -C aloop_capture -P ipod_sink`, or a second bluealsa-aplay
# configured in scripts/audio-bridge.sh).
#
# Using `!default` (with the bang) *overrides* any lower-priority default
# from /usr/share/alsa/alsa.conf. See `man 5 asound.conf` "name override".
# -----------------------------------------------------------------------------

pcm.!default {
    type plug
    slave.pcm "aloop_playback"
    hint {
        show on
        description "bt2iap — default PCM (-> aloop_playback -> iPodUSB)"
    }
}


# -----------------------------------------------------------------------------
# (6) Control default.
# -----------------------------------------------------------------------------
# Point `amixer`/`alsactl` at the iPodUSB card by default so mixer tweaks
# target the USB gadget rather than the loopback (which has no useful
# controls). Comment out if you'd rather mixer default to Loopback.
# -----------------------------------------------------------------------------

ctl.!default {
    type hw
    card "iPodUSB"
}
